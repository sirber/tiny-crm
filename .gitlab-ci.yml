stages:
  - build
  - docker

variables:
  IMAGE_BACKEND: "registry.gitlab.com/sirber/tiny-crm/tiny-crm:latest"

build:
  image: node:20-alpine
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  before_script:
    - apk add --no-cache make go
  script:
    - make build
  artifacts:
    paths:
      - ./dist/*

docker:
  image: docker:latest
  services:
    - docker:dind
  stage: docker
  dependencies:
    - build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - docker docker build -t "$IMAGE_BACKEND" ./dist
    - docker push "$IMAGE_BACKEND"